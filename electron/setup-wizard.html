<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Wraps &amp; Coffee setup</title>
<style>
  body { font-family: sans-serif; background: #111; color: #eee; padding: 20px; margin: 0; }
  h1 { font-size: 16px; margin: 0 0 12px; }
  p { font-size: 13px; color: #ccc; }
  label.role-option { display: flex; align-items: flex-start; gap: 8px; margin: 10px 0; font-size: 13px; cursor: pointer; }
  input[type='text'] { width: 100%; padding: 6px; box-sizing: border-box; background: #222; border: 1px solid #444; color: #eee; border-radius: 4px; }
  .field { margin: 12px 0; }
  .field label { display: block; margin-bottom: 4px; font-size: 12px; color: #aaa; }
  .hint { font-size: 12px; color: #8ab4f8; min-height: 16px; }
  button { margin-top: 16px; padding: 8px 18px; background: #dfa93e; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; }
  button:active { box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.4); }
</style>
</head>
<body>
  <h1>Wraps &amp; Coffee setup</h1>
  <p>Is this machine the main server, or just a display?</p>

  <label class="role-option">
    <input type="radio" name="role" value="server" />
    <span><strong>Server + Display</strong> — runs the local server on this machine (the usual choice for the first machine you set up)</span>
  </label>
  <label class="role-option">
    <input type="radio" name="role" value="display" />
    <span><strong>Display only</strong> — shows content from another machine's server already running on this network</span>
  </label>

  <p class="hint" id="probe-hint">Checking this network for an existing server…</p>

  <div class="field">
    <label for="label">Label for this machine</label>
    <input type="text" id="label" placeholder="e.g. Front counter PC" />
  </div>

  <div class="field" id="server-host-field" style="display: none">
    <label for="serverHost">Server address</label>
    <input type="text" id="serverHost" placeholder="e.g. 192.168.1.42" />
  </div>

  <button type="button" id="continue">Continue</button>

  <script>
    const { ipcRenderer } = require('electron')
    const os = require('node:os')

    document.getElementById('label').value = os.hostname()

    function updateServerHostVisibility() {
      const role = document.querySelector('input[name="role"]:checked')?.value
      document.getElementById('server-host-field').style.display = role === 'display' ? 'block' : 'none'
    }
    document.querySelectorAll('input[name="role"]').forEach((radio) => radio.addEventListener('change', updateServerHostVisibility))

    ipcRenderer.on('role-setup:probe-result', (_event, result) => {
      const radios = document.querySelectorAll('input[name="role"]')
      if (result) {
        document.getElementById('probe-hint').textContent = 'Found an existing server at ' + result.host + ' — defaulting to Display only.'
        radios.forEach((radio) => { radio.checked = radio.value === 'display' })
        document.getElementById('serverHost').value = result.host
      } else {
        document.getElementById('probe-hint').textContent = 'No existing server found on this network — defaulting to Server + Display.'
        radios.forEach((radio) => { radio.checked = radio.value === 'server' })
      }
      updateServerHostVisibility()
    })

    document.getElementById('continue').addEventListener('click', () => {
      const role = document.querySelector('input[name="role"]:checked')?.value ?? 'server'
      const label = document.getElementById('label').value.trim()
      const serverHost = document.getElementById('serverHost').value.trim()
      ipcRenderer.send('role-setup:submit', { role, label, serverHost })
    })
  </script>
</body>
</html>
